<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>民法猜谜</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', 'SimSun', monospace; background: #f5f2eb; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 16px; }
        .container { width: 100%; max-width: 750px; background: #fff; border: 1px solid #c0b7a8; display: flex; flex-direction: column; height: 90vh; }
        .header { padding: 14px 20px; border-bottom: 1px solid #d4ccc0; font-weight: bold; background: #faf8f4; }
        .log { flex: 1; overflow-y: auto; padding: 20px; line-height: 1.8; font-size: 0.95rem; }
        .line { margin-bottom: 8px; }
        .line.ai::before { content: "👨‍🦳 当事人："; font-weight: bold; color: #5c4b31; }
        .line.user::before { content: "⚖️ 律师："; font-weight: bold; color: #2d555b; }
        .line.announce { color: #947d56; text-align: center; margin: 10px 0; font-style: italic; }
        .line.error { color: #c0392b; }
        .input-area { display: flex; padding: 10px 16px; border-top: 1px solid #d4ccc0; background: #faf8f4; }
        textarea { flex: 1; resize: none; border: 1px solid #c0b7a8; padding: 10px; font-family: inherit; background: #fffefb; margin-right: 10px; }
        button { padding: 10px 24px; background: #5c4b31; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background: #bcb09b; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">📋 民事纠纷当事人询问记录</div>
    <div class="log" id="log">
        <div class="line announce">当事人已到场，询问开始。</div>
    </div>
    <div class="input-area">
        <textarea id="input" rows="1" placeholder="输入你的提问..." maxlength="400"></textarea>
        <button id="sendBtn">发送</button>
    </div>
</div>

<script>
    const API_URL = '/api/chat';
    const log = document.getElementById('log');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');

    let history = [];
    let gameOver = false;

    function addLine(role, text) {
        const div = document.createElement('div');
        div.className = `line ${role}`;
        div.textContent = text;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    async function sendMessage() {
        const userText = input.value.trim();
        if (!userText || gameOver) return;
        // ===== 新增初始化逻辑 =====
        if (history.length === 0) {
            // 第一轮对话，先让当事人打个招呼，锁定背景
            const initMessage = "唉，律师您可算来了，我这心里憋屈得很，您问吧……";
            addLine('ai', initMessage);
            history.push({ role: 'assistant', content: initMessage });
        }
        // ===== 新增逻辑结束 =====


        // 立即显示用户消息
        addLine('user', userText);
        // 更新本地历史（用户消息）
        history.push({ role: 'user', content: userText });

        // 禁用输入
        sendBtn.disabled = true;
        input.disabled = true;
        input.value = '';

        try {
            const resp = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ history, question: userText })
            });

            if (!resp.ok) {
                const errText = await resp.text();
                throw new Error(`状态 ${resp.status}: ${errText}`);
            }

            const data = await resp.json();
            const aiReply = data.aiReply || '（未收到回复）';

            // 显示 AI 回复
            addLine('ai', aiReply);
            // 本地历史加入 AI 回复
            history.push({ role: 'assistant', content: aiReply });

            // 处理结束状态
            if (data.gameOver) {
                gameOver = true;
                if (data.endType === 'judge') {
                    addLine('announce', '—— 当事人坦白，询问结束 ——');
                } else if (data.endType === 'guess') {
                    addLine('announce', '—— 律师猜中，询问结束 ——');
                }
                sendBtn.disabled = true;
                input.disabled = true;
            }
        } catch (e) {
            addLine('error', '错误：' + e.message);
            // 回滚用户消息（因出错未能完成对话）
            history.pop();
        } finally {
            if (!gameOver) {
                sendBtn.disabled = false;
                input.disabled = false;
                input.focus();
            }
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
</script>
</body>
</html>
